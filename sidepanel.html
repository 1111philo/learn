<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1111 Learn</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <img src="assets/icon-32.png" alt="1111" class="logo">
    <span class="header-title">Learn</span>
    <div class="header-spacer"></div>
    <div class="user-menu" id="user-menu">
      <button class="user-menu-btn" id="user-menu-btn" aria-haspopup="true" aria-expanded="false" aria-label="Account menu">
        <svg class="user-icon" width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="user-menu-name" id="user-menu-name"></span>
      </button>
      <div class="user-dropdown" id="user-dropdown" hidden></div>
    </div>
  </header>

  <main id="main-content" tabindex="-1" aria-label="App content">
    <!-- Views rendered here by app.js -->
    <div id="modal-overlay" hidden></div>
  </main>

  <nav aria-label="Main navigation">
    <button data-nav="courses" aria-current="page">Courses</button>
    <button data-nav="work">Work</button>
    <button data-nav="settings">Settings</button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
