name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for merge-readiness into main. Focus on:

            1. **Legacy/stale references**: Flag any mentions of removed features, old names
               (e.g. "1111 School" instead of "1111"), deleted modules, or outdated architecture
               descriptions in code, comments, docs, and config files.

            2. **Doc consistency**: Check that any documentation (README, inline comments, docstrings,
               markdown files) accurately reflects the code changes in this PR. Flag docs that
               describe behavior the PR removes or changes.

            3. **Deploy/infra consistency**: Verify docker-compose.yml, Dockerfile, infra/ terraform
               files, and CI workflows reference correct service names, ports, env vars, and
               image names. Flag anything that contradicts what the PR introduces or removes.

            4. **Test coverage**: Check that tests are not importing deleted modules or testing
               removed behavior. Flag test files that reference features changed by this PR
               but weren't updated.

            5. **Cross-file consistency**: Verify that types, route names, model names, API
               endpoints, and env vars are consistent across frontend, backend, and infra.

            Post a single review comment summarizing findings grouped by category.
            If everything looks consistent, confirm that explicitly.

