name: Staging RC

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  staging-rc:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Determine RC version
        id: rc
        run: |
          # Count non-bump commits since staging diverged from main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          RC_NUM=$(git log --oneline "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep | wc -l | tr -d ' ')

          if [ "$RC_NUM" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since main — skipping RC build."
            exit 0
          fi

          # Use latest release tag as base version
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v '\-RC' | head -1 || echo "v0.0.0")
          BASE_VERSION=$(echo "$LAST_TAG" | sed 's/^v//' | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          RC_VERSION="${BASE_VERSION}-RC${RC_NUM}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "rc_version=$RC_VERSION" >> "$GITHUB_OUTPUT"
          echo "RC version: $RC_VERSION"

          git log --pretty=format:"%h %s" "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep > /tmp/commits.txt

      - name: Generate release notes
        if: steps.rc.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RC_VERSION: ${{ steps.rc.outputs.rc_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, re

          rc_version = os.environ["RC_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          testing = """

          ---

          ## How to test this release candidate

          Visit **https://learn.philosophers.group** — the web app is deployed automatically when changes reach main.

          To test the RC locally:
          1. Clone the repo and checkout `staging`
          2. Run `npm install && npm run build`
          3. Serve the `dist/` directory with any static server

          Report issues at https://github.com/1111philo/learn/issues.
          """

          prompt = f"You are a release manager for a web app called \"1111 Learn\".\n\nThis is release candidate: {rc_version}\n\nBelow are ALL commits on the staging branch since the last production release. Summarize everything cumulatively.\n\n{commits}\n\nWrite concise release notes. Respond with ONLY valid JSON (no markdown fences, no explanation) in this exact format:\n{{\"release_notes\": \"## What's New\\n\\n- bullet point summaries of changes\"}}"

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              with open("/tmp/release_notes.md", "w") as f:
                  f.write(f"## Changes\n\n{commits}\n")
                  f.write(testing)
              raise SystemExit(0)

          text = data["content"][0]["text"]
          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(result["release_notes"])
              f.write(testing)
          PYEOF

      - name: Create GitHub pre-release
        if: steps.rc.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          gh release create "v${RC_VERSION}" \
            --title "v${RC_VERSION}" \
            --notes-file /tmp/release_notes.md \
            --prerelease
