name: Staging RC

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  staging-rc:
    # Skip runs triggered by the version bump commit
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for merge-base and tag counting

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Determine RC version
        id: rc
        run: |
          # Get main's version — this is the base for all RCs
          BASE_VERSION=$(git show origin/main:manifest.json | jq -r '.version' | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          # Count commits on staging since it diverged from main,
          # excluding version bump commits (which are bot noise)
          MERGE_BASE=$(git merge-base origin/main HEAD)
          RC_NUM=$(git log --oneline "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep | wc -l | tr -d ' ')

          if [ "$RC_NUM" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since main — skipping RC build."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "rc_num=$RC_NUM" >> "$GITHUB_OUTPUT"
          echo "rc_version=${BASE_VERSION}-RC${RC_NUM}" >> "$GITHUB_OUTPUT"
          echo "RC version: ${BASE_VERSION}-RC${RC_NUM}"

          # Save commit list for release notes
          git log --pretty=format:"%h %s" "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep > /tmp/commits.txt

      - name: Write testing instructions
        if: steps.rc.outputs.skip != 'true'
        run: |
          cat > /tmp/testing_instructions.md << 'INSTEOF'

          ---

          ## How to test this release candidate

          ### New testers
          1. Download the `.zip` file attached to this release.
          2. Unzip it to a folder on your computer.
          3. Open Chrome and go to `chrome://extensions`.
          4. Enable **Developer mode** (toggle in the top-right corner).
          5. Click **Load unpacked** and select the unzipped folder.
          6. The 1111 Learn icon will appear in your toolbar — click it to open the side panel.
          7. Complete the onboarding wizard (you'll need an Anthropic API key).

          ### Existing testers updating to a new RC
          1. Download the `.zip` file attached to this release.
          2. Unzip it, replacing the contents of your existing extension folder.
          3. Go to `chrome://extensions` and click the **reload** button (↻) on the 1111 Learn card.
          4. Your data (courses, progress, profile) is preserved — the extension migrates data automatically.

          ### What to look for
          - Verify existing course progress and learner profile are intact after updating.
          - Test the new changes described above.
          - Report issues at https://github.com/1111philo/learn-extension/issues.
          INSTEOF

      - name: Generate release notes
        if: steps.rc.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RC_VERSION: ${{ steps.rc.outputs.rc_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, re

          rc_version = os.environ["RC_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          with open("/tmp/testing_instructions.md") as f:
              testing = f.read()

          prompt = f"You are a release manager for a Chrome extension called \"1111 Learn\".\n\nThis is release candidate: {rc_version}\n\nBelow are ALL commits on the staging branch since the last production release. Summarize everything cumulatively — these release notes should cover all changes a tester would see if upgrading from the last production version, not just what changed in this specific RC.\n\n{commits}\n\nWrite concise release notes. Respond with ONLY valid JSON (no markdown fences, no explanation) in this exact format:\n{{\"release_notes\": \"## What's New\\n\\n- bullet point summaries of changes\"}}"

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              with open("/tmp/release_notes.md", "w") as f:
                  f.write(f"## Changes\n\n{commits}\n")
                  f.write(testing)
              raise SystemExit(0)

          text = data["content"][0]["text"]
          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(result["release_notes"])
              f.write(testing)
          PYEOF

      - name: Update manifest.json with RC version
        if: steps.rc.outputs.skip != 'true'
        run: |
          BASE_VERSION="${{ steps.rc.outputs.base_version }}"
          RC_NUM="${{ steps.rc.outputs.rc_num }}"
          RC_DISPLAY="${{ steps.rc.outputs.rc_version }}"

          # version uses 4-segment numeric format for Chrome compatibility
          jq --arg v "${BASE_VERSION}.${RC_NUM}" --arg vn "$RC_DISPLAY" \
            '.version = $v | .version_name = $vn' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "Updated manifest.json:"
          cat manifest.json

      - name: Build extension zip
        if: steps.rc.outputs.skip != 'true'
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          ZIP_NAME="1111-learn-v${RC_VERSION}.zip"

          cd dist
          zip -r "../$ZIP_NAME" .
          cd ..

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Commit version bump
        if: steps.rc.outputs.skip != 'true'
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${RC_VERSION}" || echo "No changes to commit"
          git push

      - name: Create GitHub pre-release
        if: steps.rc.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          gh release create "v${RC_VERSION}" \
            "${{ env.zip_name }}" \
            --title "v${RC_VERSION}" \
            --notes-file /tmp/release_notes.md \
            --prerelease
