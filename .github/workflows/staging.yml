name: Staging RC

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  # ── Determine RC version ─────────────────────────────────────────────────
  prepare:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.rc.outputs.skip }}
      rc_version: ${{ steps.rc.outputs.rc_version }}
      base_version: ${{ steps.rc.outputs.base_version }}
      rc_num: ${{ steps.rc.outputs.rc_num }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm test

      - name: Determine RC version
        id: rc
        run: |
          BASE_VERSION=$(git show origin/main:manifest.json | jq -r '.version' | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          MERGE_BASE=$(git merge-base origin/main HEAD)
          RC_NUM=$(git log --oneline "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep | wc -l | tr -d ' ')

          if [ "$RC_NUM" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since main — skipping RC build."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "rc_num=$RC_NUM" >> "$GITHUB_OUTPUT"
          echo "rc_version=${BASE_VERSION}-RC${RC_NUM}" >> "$GITHUB_OUTPUT"
          echo "RC version: ${BASE_VERSION}-RC${RC_NUM}"

          git log --pretty=format:"%h %s" "$MERGE_BASE..HEAD" --grep='chore: bump version' --invert-grep > /tmp/commits.txt

      - name: Write testing instructions
        if: steps.rc.outputs.skip != 'true'
        run: |
          cat > /tmp/testing_instructions.md << 'INSTEOF'

          ---

          ## How to test this release candidate

          ### Chrome extension
          1. Download the `-chrome.zip` file attached to this release.
          2. Unzip it to a folder on your computer.
          3. Open Chrome and go to `chrome://extensions`.
          4. Enable **Developer mode** (toggle in the top-right corner).
          5. Click **Load unpacked** and select the unzipped folder.
          6. The 1111 Learn icon will appear in your toolbar — click it to open the side panel.

          ### Android
          1. Download the `.apk` file attached to this release.
          2. Transfer it to your Android device and install it (you may need to enable "Install from unknown sources").

          ### iOS (Simulator only)
          1. Download the `-ios-simulator.zip` file.
          2. Unzip and drag `App.app` into an open iOS Simulator.

          ### macOS
          1. Download the `.dmg` file.
          2. Open it and drag 1111 Learn to Applications.

          ### Windows
          1. Download the `-setup.exe` file and run the installer.

          ### What to look for
          - Verify existing course progress and learner profile are intact after updating.
          - Test the new changes described above.
          - Report issues at https://github.com/1111philo/learn-extension/issues.
          INSTEOF

      - name: Generate release notes
        if: steps.rc.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RC_VERSION: ${{ steps.rc.outputs.rc_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, re

          rc_version = os.environ["RC_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          with open("/tmp/testing_instructions.md") as f:
              testing = f.read()

          prompt = f"You are a release manager for a Chrome extension called \"1111 Learn\".\n\nThis is release candidate: {rc_version}\n\nBelow are ALL commits on the staging branch since the last production release. Summarize everything cumulatively — these release notes should cover all changes a tester would see if upgrading from the last production version, not just what changed in this specific RC.\n\n{commits}\n\nWrite concise release notes. Respond with ONLY valid JSON (no markdown fences, no explanation) in this exact format:\n{{\"release_notes\": \"## What's New\\n\\n- bullet point summaries of changes\"}}"

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              with open("/tmp/release_notes.md", "w") as f:
                  f.write(f"## Changes\n\n{commits}\n")
                  f.write(testing)
              raise SystemExit(0)

          text = data["content"][0]["text"]
          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(result["release_notes"])
              f.write(testing)
          PYEOF

      - name: Upload release notes
        if: steps.rc.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release_notes.md

  # ── Chrome extension ─────────────────────────────────────────────────────
  build-chrome:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci

      - name: Set RC version in manifest
        run: |
          BASE="${{ needs.prepare.outputs.base_version }}"
          RC_NUM="${{ needs.prepare.outputs.rc_num }}"
          RC_DISPLAY="${{ needs.prepare.outputs.rc_version }}"
          jq --arg v "${BASE}.${RC_NUM}" --arg vn "$RC_DISPLAY" \
            '.version = $v | .version_name = $vn' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Build and package
        run: |
          npm run build
          cd dist && zip -r ../1111-learn-chrome-v${{ needs.prepare.outputs.rc_version }}.zip . -x '.env.js' && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: 1111-learn-chrome-v${{ needs.prepare.outputs.rc_version }}.zip

  # ── Android APK ──────────────────────────────────────────────────────────
  build-android:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm ci
      - run: npm run build:app
      - run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             1111-learn-android-v${{ needs.prepare.outputs.rc_version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: 1111-learn-android-v${{ needs.prepare.outputs.rc_version }}.apk

  # ── iOS build ────────────────────────────────────────────────────────────
  build-ios:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app
      - run: npx cap sync ios

      - name: Build iOS (simulator, unsigned)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" | tail -20

      - name: Package iOS build
        run: |
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/1111-learn-ios-simulator-v${{ needs.prepare.outputs.rc_version }}.zip" "$(basename "$APP_PATH")"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: 1111-learn-ios-simulator-v${{ needs.prepare.outputs.rc_version }}.zip

  # ── Electron macOS ───────────────────────────────────────────────────────
  build-electron-mac:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app

      - name: Build Electron macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never --config.extraMetadata.version=${{ needs.prepare.outputs.rc_version }}

      - name: Rename artifacts
        run: |
          for f in release/*.dmg; do
            [ -f "$f" ] && cp "$f" "1111-learn-macos-v${{ needs.prepare.outputs.rc_version }}.dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: 1111-learn-macos-v${{ needs.prepare.outputs.rc_version }}.dmg

  # ── Electron Windows ─────────────────────────────────────────────────────
  build-electron-win:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app

      - name: Build Electron Windows
        run: npx electron-builder --win --publish never --config.extraMetadata.version=${{ needs.prepare.outputs.rc_version }}

      - name: Rename artifacts
        shell: bash
        run: |
          for f in release/*.exe; do
            [ -f "$f" ] && cp "$f" "1111-learn-windows-v${{ needs.prepare.outputs.rc_version }}-setup.exe"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: 1111-learn-windows-v${{ needs.prepare.outputs.rc_version }}-setup.exe

  # ── Commit version bump + create pre-release ─────────────────────────────
  release:
    needs: [prepare, build-chrome, build-android, build-ios, build-electron-mac, build-electron-win]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Commit RC version bump
        run: |
          BASE="${{ needs.prepare.outputs.base_version }}"
          RC_NUM="${{ needs.prepare.outputs.rc_num }}"
          RC_DISPLAY="${{ needs.prepare.outputs.rc_version }}"
          jq --arg v "${BASE}.${RC_NUM}" --arg vn "$RC_DISPLAY" \
            '.version = $v | .version_name = $vn' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${RC_DISPLAY}" || echo "No changes to commit"
          git push

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION="${{ needs.prepare.outputs.rc_version }}"

          FILES=""
          for f in artifacts/chrome-extension/*.zip; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/android-apk/*.apk; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/ios-build/*.zip; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/electron-mac/*; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/electron-win/*.exe; do [ -f "$f" ] && FILES="$FILES $f"; done

          gh release create "v${RC_VERSION}" \
            $FILES \
            --title "v${RC_VERSION}" \
            --notes-file artifacts/release-notes/release_notes.md \
            --prerelease
