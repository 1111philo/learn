name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Determine version and generate release notes ─────────────────────────
  prepare:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.claude.outputs.new_version }}
      skip: ${{ steps.context.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get current version and commits since last release
        id: context
        run: |
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          BASE_VERSION=$(echo "$CURRENT_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "current_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v '\-RC' | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            HIGHEST_VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
            echo "highest_version=$HIGHEST_VERSION" >> "$GITHUB_OUTPUT"
            COMMITS=$(git log --pretty=format:"%h %s" "${LAST_TAG}..HEAD")
          else
            echo "highest_version=0.0.0" >> "$GITHUB_OUTPUT"
            COMMITS=$(git log --pretty=format:"%h %s" HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" > /tmp/commits.txt

      - name: Ask Claude for version and release notes
        if: steps.context.outputs.skip != 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CURRENT_VERSION: ${{ steps.context.outputs.current_version }}
          HIGHEST_VERSION: ${{ steps.context.outputs.highest_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          version = os.environ["CURRENT_VERSION"]
          highest = os.environ["HIGHEST_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          prompt = f"""You are a release manager for a Chrome extension called "1111 Learn".

          Current version in manifest: {version}
          Highest published version: {highest}
          The extension uses semantic versioning (MAJOR.MINOR.PATCH):
          - PATCH: bug fixes, copy changes, small tweaks
          - MINOR: new features, significant UI changes, new agent behaviors
          - MAJOR: breaking changes, major rewrites, architecture overhauls

          CRITICAL: The new version MUST be strictly greater than {highest}. Chrome Web Store rejects versions that are not higher than the last published version.

          Here are the commits since the last release:
          {commits}

          Respond with ONLY valid JSON (no markdown fences, no explanation) in this exact format:
          {{
            "version": "X.Y.Z",
            "release_notes": "## What's New\\n\\n- bullet point summaries of changes\\n\\n## Details\\n\\nBrief paragraph if needed."
          }}"""

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          import re

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              raise SystemExit(1)

          text = data["content"][0]["text"]
          print(f"Claude raw response: {text}")

          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)

          new_version = result["version"]
          release_notes = result["release_notes"]

          def version_tuple(v):
              return tuple(int(x) for x in v.split('.'))

          if version_tuple(new_version) <= version_tuple(highest):
              h = version_tuple(highest)
              new_version = f"{h[0]}.{h[1]}.{h[2] + 1}"
              print(f"Claude chose {result['version']} which is not greater than {highest}. Auto-fixed to {new_version}")

          print(f"Final version: {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")

          with open("/tmp/release_notes.md", "w") as f:
              f.write(release_notes)
          PYEOF

      - name: Upload release notes
        if: steps.context.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release_notes.md

  # ── Chrome extension ─────────────────────────────────────────────────────
  build-chrome:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci

      - name: Set version in manifest
        run: |
          jq --arg v "${{ needs.prepare.outputs.new_version }}" \
            '.version = $v | del(.version_name)' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Build and package Chrome extension
        run: |
          npm run build
          cd dist && zip -r ../1111-learn-chrome-v${{ needs.prepare.outputs.new_version }}.zip . -x '.env.js' && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: 1111-learn-chrome-v${{ needs.prepare.outputs.new_version }}.zip

  # ── Android APK ──────────────────────────────────────────────────────────
  build-android:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm ci
      - run: npm run build:app
      - run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             1111-learn-android-v${{ needs.prepare.outputs.new_version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: 1111-learn-android-v${{ needs.prepare.outputs.new_version }}.apk

  # ── iOS build (requires macOS + Xcode) ───────────────────────────────────
  build-ios:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app
      - run: npx cap sync ios

      - name: Build iOS (unsigned, no-code-sign)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" | tail -20

      - name: Package iOS build
        run: |
          cd ios/App/build/Build/Products/Release-iphonesimulator
          zip -r ../../../../../../1111-learn-ios-simulator-v${{ needs.prepare.outputs.new_version }}.zip App.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: 1111-learn-ios-simulator-v${{ needs.prepare.outputs.new_version }}.zip

  # ── Electron macOS ───────────────────────────────────────────────────────
  build-electron-mac:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app

      - name: Build Electron macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never --config.extraMetadata.version=${{ needs.prepare.outputs.new_version }}

      - name: Rename artifacts
        run: |
          for f in release/*.dmg; do
            [ -f "$f" ] && cp "$f" "1111-learn-macos-v${{ needs.prepare.outputs.new_version }}.dmg"
          done
          for f in release/*.zip; do
            [ -f "$f" ] && cp "$f" "1111-learn-macos-v${{ needs.prepare.outputs.new_version }}.zip"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: 1111-learn-macos-v${{ needs.prepare.outputs.new_version }}.*

  # ── Electron Windows ─────────────────────────────────────────────────────
  build-electron-win:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:app

      - name: Build Electron Windows
        run: npx electron-builder --win --publish never --config.extraMetadata.version=${{ needs.prepare.outputs.new_version }}

      - name: Rename artifacts
        shell: bash
        run: |
          for f in release/*.exe; do
            [ -f "$f" ] && cp "$f" "1111-learn-windows-v${{ needs.prepare.outputs.new_version }}-setup.exe"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: 1111-learn-windows-v${{ needs.prepare.outputs.new_version }}-setup.exe

  # ── Create release with all artifacts ────────────────────────────────────
  release:
    needs: [prepare, build-chrome, build-android, build-ios, build-electron-mac, build-electron-win]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update manifest and commit version bump
        continue-on-error: true
        run: |
          NEW_VERSION="${{ needs.prepare.outputs.new_version }}"
          jq --arg v "$NEW_VERSION" '.version = $v | del(.version_name)' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${NEW_VERSION}" || echo "No changes to commit"
          git push || echo "Version bump push failed (branch protection). Release will still be created."

      - name: Create GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ needs.prepare.outputs.new_version }}"

          # Collect all built files
          FILES=""
          for f in artifacts/chrome-extension/*.zip; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/android-apk/*.apk; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/ios-build/*.zip; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/electron-mac/*; do [ -f "$f" ] && FILES="$FILES $f"; done
          for f in artifacts/electron-win/*.exe; do [ -f "$f" ] && FILES="$FILES $f"; done

          gh release create "v${NEW_VERSION}" \
            $FILES \
            --title "v${NEW_VERSION}" \
            --notes-file artifacts/release-notes/release_notes.md || echo "Release already exists."

      - name: Publish Chrome extension to Web Store
        continue-on-error: true
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          CHROME_ZIP=$(ls artifacts/chrome-extension/*.zip | head -1)

          TOKEN_RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${GOOGLE_CLIENT_ID}" \
            -d "client_secret=${GOOGLE_CLIENT_SECRET}" \
            -d "refresh_token=${GOOGLE_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token:"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "$CHROME_ZIP")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')

          echo "Upload response ($HTTP_CODE): $BODY"

          UPLOAD_STATUS=$(echo "$BODY" | jq -r '.uploadState')
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            echo "Upload failed with status: $UPLOAD_STATUS"
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')

          echo "Publish response ($HTTP_CODE): $BODY"

          PUBLISH_STATUS=$(echo "$BODY" | jq -r '.status[0]')
          if [ "$PUBLISH_STATUS" != "OK" ]; then
            echo "Publish failed with status: $PUBLISH_STATUS"
            echo "Note: this may mean the extension is pending review."
          fi
