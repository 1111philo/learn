name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # Skip runs triggered by the version bump commit
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for commit analysis

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: npm test

      - name: Get current version and commits since last release
        id: context
        run: |
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          # Strip any 4th RC segment to get base version
          BASE_VERSION=$(echo "$CURRENT_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "current_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          # Find the last non-RC release tag, or use the initial commit
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v '\-RC' | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%h %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%h %s" "${LAST_TAG}..HEAD")
          fi

          # Skip if no new commits since last tag
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Save commits to file (handles multiline safely)
          echo "$COMMITS" > /tmp/commits.txt

      - name: Ask Claude for version and release notes
        if: steps.context.outputs.skip != 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CURRENT_VERSION: ${{ steps.context.outputs.current_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          version = os.environ["CURRENT_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          prompt = f"""You are a release manager for a Chrome extension called "1111 Learn".

          Current version: {version}
          The extension uses semantic versioning (MAJOR.MINOR.PATCH):
          - PATCH: bug fixes, copy changes, small tweaks
          - MINOR: new features, significant UI changes, new agent behaviors
          - MAJOR: breaking changes, major rewrites, architecture overhauls

          Chrome Web Store requires that each new version number is strictly greater than the previous one.

          Here are the commits since the last release:
          {commits}

          Respond with ONLY valid JSON (no markdown fences, no explanation) in this exact format:
          {{
            "version": "X.Y.Z",
            "release_notes": "## What's New\\n\\n- bullet point summaries of changes\\n\\n## Details\\n\\nBrief paragraph if needed."
          }}"""

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          import re

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              raise SystemExit(1)

          text = data["content"][0]["text"]
          print(f"Claude raw response: {text}")

          # Strip markdown fences if present
          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)

          new_version = result["version"]
          release_notes = result["release_notes"]

          print(f"Claude chose version: {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")

          with open("/tmp/release_notes.md", "w") as f:
              f.write(release_notes)
          PYEOF

      - name: Update manifest.json version
        if: steps.context.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.claude.outputs.new_version }}"
          # Set clean 3-segment version and strip any RC version_name from staging merges
          jq --arg v "$NEW_VERSION" '.version = $v | del(.version_name)' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "Updated manifest.json to version $NEW_VERSION"
          cat manifest.json

      - name: Build extension zip
        if: steps.context.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.claude.outputs.new_version }}"
          ZIP_NAME="1111-learn-v${NEW_VERSION}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env.js" \
            -x ".env.example.js" \
            -x ".gitignore" \
            -x ".DS_Store" \
            -x "*.crx" \
            -x "*.pem" \
            -x "*.zip" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "scripts/*" \
            -x "CLAUDE.md" \
            -x "CONTRIBUTING.md" \
            -x "LICENSE"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Commit version bump
        if: steps.context.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.claude.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${NEW_VERSION}" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.claude.outputs.new_version }}"
          gh release create "v${NEW_VERSION}" \
            "${{ env.zip_name }}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release_notes.md

      - name: Publish to Chrome Web Store
        if: steps.context.outputs.skip != 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          # Get access token from refresh token
          TOKEN_RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${GOOGLE_CLIENT_ID}" \
            -d "client_secret=${GOOGLE_CLIENT_SECRET}" \
            -d "refresh_token=${GOOGLE_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token:"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          # Upload zip to Chrome Web Store
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "${{ env.zip_name }}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')

          echo "Upload response ($HTTP_CODE): $BODY"

          UPLOAD_STATUS=$(echo "$BODY" | jq -r '.uploadState')
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            echo "Upload failed with status: $UPLOAD_STATUS"
            exit 1
          fi

          # Publish the uploaded version
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')

          echo "Publish response ($HTTP_CODE): $BODY"

          PUBLISH_STATUS=$(echo "$BODY" | jq -r '.status[0]')
          if [ "$PUBLISH_STATUS" != "OK" ]; then
            echo "Publish failed with status: $PUBLISH_STATUS"
            echo "Note: this may mean the extension is pending review."
          fi
