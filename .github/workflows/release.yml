name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Get commits since last release
        id: context
        run: |
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v '\-RC' | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            HIGHEST_VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
            COMMITS=$(git log --pretty=format:"%h %s" "${LAST_TAG}..HEAD")
          else
            HIGHEST_VERSION="0.0.0"
            COMMITS=$(git log --pretty=format:"%h %s" HEAD)
          fi

          echo "highest_version=$HIGHEST_VERSION" >> "$GITHUB_OUTPUT"

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" > /tmp/commits.txt

      - name: Ask Claude for version and release notes
        if: steps.context.outputs.skip != 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HIGHEST_VERSION: ${{ steps.context.outputs.highest_version }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, re

          highest = os.environ["HIGHEST_VERSION"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("/tmp/commits.txt") as f:
              commits = f.read().strip()

          prompt = f"""You are a release manager for a web app called "1111 Learn".

          Highest published version: {highest}
          Semantic versioning (MAJOR.MINOR.PATCH):
          - PATCH: bug fixes, copy changes, small tweaks
          - MINOR: new features, significant UI changes, new agent behaviors
          - MAJOR: breaking changes, major rewrites, architecture overhauls

          CRITICAL: The new version MUST be strictly greater than {highest}.

          Commits since the last release:
          {commits}

          Respond with ONLY valid JSON (no markdown fences) in this format:
          {{
            "version": "X.Y.Z",
            "release_notes": "## What's New\\n\\n- bullet point summaries of changes"
          }}"""

          body = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=body,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"API error {e.code}: {e.read().decode()}")
              raise SystemExit(1)

          text = data["content"][0]["text"]
          print(f"Claude raw response: {text}")

          text = re.sub(r'^```json?\s*\n?', '', text.strip())
          text = re.sub(r'\n?```\s*$', '', text.strip())

          result = json.loads(text)
          new_version = result["version"]
          release_notes = result["release_notes"]

          def version_tuple(v):
              return tuple(int(x) for x in v.split('.'))

          if version_tuple(new_version) <= version_tuple(highest):
              h = version_tuple(highest)
              new_version = f"{h[0]}.{h[1]}.{h[2] + 1}"
              print(f"Auto-fixed version to {new_version}")

          print(f"Final version: {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")

          with open("/tmp/release_notes.md", "w") as f:
              f.write(release_notes)
          PYEOF

      - name: Create GitHub Release
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.claude.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}" || true

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release_notes.md || echo "Release already exists."
